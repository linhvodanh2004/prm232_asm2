<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Author Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">eBookStore</a>
            <span class="navbar-text text-white">Author Management</span>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title text-primary fw-bold m-0">Authors List</h5>
                    <button class="btn btn-success fw-semibold shadow-sm" onclick="showAddModal()">+ Add Author</button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle border" id="authorsTable">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="authorsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="authModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content shadow">
                <form id="authForm">
                    <div class="modal-header text-white bg-primary">
                        <h5 class="modal-title fw-bold" id="authModalLabel">Author Info</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="authorId" value="0" />
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">First Name <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="fName" required maxlength="100">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Last Name <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="lName" required maxlength="100">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone</label>
                                <input type="text" class="form-control" id="phone" maxlength="20">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Address</label>
                                <input type="text" class="form-control" id="address">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">City</label>
                                <input type="text" class="form-control" id="city" maxlength="100">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">State</label>
                                <input type="text" class="form-control" id="state" maxlength="100">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Zip</label>
                                <input type="text" class="form-control" id="zip" maxlength="20">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary fw-semibold">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = '/api/authors';
        let modalInstance = null;

        $(document).ready(function () {
            modalInstance = new bootstrap.Modal(document.getElementById('authModal'));
            loadData();

            $('#authForm').submit(function (e) {
                e.preventDefault();
                saveData();
            });
        });

        function loadData() {
            $.ajax({
                url: apiUrl,
                method: 'GET',
                success: function (data) {
                    let tbody = $('#authorsTableBody');
                    tbody.empty();
                    data.forEach(a => {
                        tbody.append(`<tr>
                        <td>${a.authorId}</td>
                        <td>${a.firstName}</td>
                        <td>${a.lastName}</td>
                        <td>${a.emailAddress}</td>
                        <td>${a.phone || '-'}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-primary" onclick="showEditModal(${a.authorId})">Edit</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteData(${a.authorId})">Delete</button>
                        </td>
                    </tr>`);
                    });
                }
            });
        }

        function showAddModal() {
            $('#authorId').val(0);
            $('#authForm')[0].reset();
            modalInstance.show();
        }

        function showEditModal(id) {
            $.get(apiUrl + '/' + id, function (a) {
                $('#authorId').val(a.authorId);
                $('#fName').val(a.firstName);
                $('#lName').val(a.lastName);
                $('#email').val(a.emailAddress);
                $('#phone').val(a.phone);
                $('#address').val(a.address);
                $('#city').val(a.city);
                $('#state').val(a.state);
                $('#zip').val(a.zip);
                modalInstance.show();
            });
        }

        function saveData() {
            let id = parseInt($('#authorId').val());
            let data = {
                firstName: $('#fName').val(),
                lastName: $('#lName').val(),
                emailAddress: $('#email').val(),
                phone: $('#phone').val(),
                address: $('#address').val(),
                city: $('#city').val(),
                state: $('#state').val(),
                zip: $('#zip').val()
            };

            if (id > 0) {
                data.authorId = id;
            }
            $.ajax({
                url: id > 0 ? apiUrl + '/' + id : apiUrl,
                method: id > 0 ? 'PUT' : 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function () {
                    modalInstance.hide();
                    loadData();
                }
            });
        }

        function deleteData(id) {
            if (confirm("Delete author?")) {
                $.ajax({
                    url: apiUrl + '/' + id,
                    method: 'DELETE',
                    success: function () { loadData(); }
                });
            }
        }
    </script>
</body>

</html>
