<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publisher Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">eBookStore</a>
            <span class="navbar-text text-white">Publisher Management</span>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title text-primary fw-bold m-0">Publishers List</h5>
                    <button class="btn btn-success fw-semibold shadow-sm" onclick="showAddModal()">+ Add
                        Publisher</button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle border" id="publishersTable">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Publisher Name</th>
                                <th>City</th>
                                <th>State</th>
                                <th>Country</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="publishersTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="pubModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content shadow">
                <form id="pubForm">
                    <div class="modal-header text-white bg-primary">
                        <h5 class="modal-title fw-bold" id="pubModalLabel">Publisher Info</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="pubId" value="0" />
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="pubName" required maxlength="200">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">City</label>
                            <input type="text" class="form-control" id="city" maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">State</label>
                            <input type="text" class="form-control" id="state" maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Country</label>
                            <input type="text" class="form-control" id="country" maxlength="100">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary fw-semibold">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = '/api/publishers';
        let modalInstance = null;

        $(document).ready(function () {
            modalInstance = new bootstrap.Modal(document.getElementById('pubModal'));
            loadData();

            $('#pubForm').submit(function (e) {
                e.preventDefault();
                saveData();
            });
        });

        function loadData() {
            $.ajax({
                url: apiUrl,
                method: 'GET',
                success: function (data) {
                    let tbody = $('#publishersTableBody');
                    tbody.empty();
                    data.forEach(p => {
                        tbody.append(`<tr>
                        <td>${p.pubId}</td>
                        <td>${p.publisherName}</td>
                        <td>${p.city || '-'}</td>
                        <td>${p.state || '-'}</td>
                        <td>${p.country || '-'}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-primary" onclick="showEditModal(${p.pubId})">Edit</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteData(${p.pubId})">Delete</button>
                        </td>
                    </tr>`);
                    });
                }
            });
        }

        function showAddModal() {
            $('#pubId').val(0);
            $('#pubForm')[0].reset();
            modalInstance.show();
        }

        function showEditModal(id) {
            $.get(apiUrl + '/' + id, function (p) {
                $('#pubId').val(p.pubId);
                $('#pubName').val(p.publisherName);
                $('#city').val(p.city);
                $('#state').val(p.state);
                $('#country').val(p.country);
                modalInstance.show();
            });
        }

        function saveData() {
            let id = parseInt($('#pubId').val());
            let data = {
                publisherName: $('#pubName').val(),
                city: $('#city').val(),
                state: $('#state').val(),
                country: $('#country').val()
            };

            if (id > 0) {
                data.pubId = id;
            }

            $.ajax({
                url: id > 0 ? apiUrl + '/' + id : apiUrl,
                method: id > 0 ? 'PUT' : 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function () {
                    modalInstance.hide();
                    loadData();
                }
            });
        }

        function deleteData(id) {
            if (confirm("Delete publisher?")) {
                $.ajax({
                    url: apiUrl + '/' + id,
                    method: 'DELETE',
                    success: function () { loadData(); },
                    error: function (err) {
                        if (err.responseText) {
                            alert(err.responseText);
                        } else {
                            alert("Failed to delete publisher.");
                        }
                    }
                });
            }
        }
    </script>
</body>

</html>
